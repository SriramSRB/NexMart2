apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexmart2-deployment 
  labels:
    project: nexmart
spec:
  replicas: 2
  strategy: 
    type: RollingUpdate
  selector:
    matchLabels: 
      project: nexmart
  template:
    metadata:
      labels:
        project: nexmart
    spec:
      containers:
        - name: nexmart-container
          image: sriramsrb/nexmart2:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

---

apiVersion: v1
kind: Service
metadata:
  name: nexmart2-service 
  labels:
    project: nexmart
spec:
  type: NodePort
  selector:
    project: nexmart
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080